# -- General -------------------------------------------------------------------

# Claude Code passthrough (notifications, progress bar)
set -g allow-passthrough on

# 256 color and true color support
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:RGB"

# Remove ESC key delay (improve UI responsiveness)
set -sg escape-time 0

# Extended keys support
set -g extended-keys on

# Mouse support
set -g mouse on

# Scrollback buffer
set -g history-limit 50000

# Focus events
set -g focus-events on

# -- Modules -------------------------------------------------------------------

# Key bindings (prefix, shortcuts, etc.)
source-file ~/.config/tmux/keybindings.conf

# UI theme (status bar, colors, etc.)
source-file ~/.config/tmux/theme.conf

# -- Plugins (TPM) ------------------------------------------------------------

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-cpu'

run '~/.config/tmux/plugins/tpm/tpm'
