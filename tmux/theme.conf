# -- Pill-shaped Status Bar ----------------------------------------------------
#
# Glyph placeholders (substituted at install time by _lib.sh):
#   __PILL_L__        U+E0B6  Powerline round left cap
#   __PILL_R__        U+E0B4  Powerline round right cap
#   __ICON_TERMINAL__ U+F018D Nerd Font terminal
#   __ICON_FOLDER__   U+F024B Nerd Font folder
#   __ICON_CPU__      U+F4BC  Nerd Font cpu
#   __ICON_MEMORY__   U+EFC5  Nerd Font memory
#   __ICON_CALENDAR__ U+F00F0 Nerd Font calendar

set -g status on
set -g status-interval 5
set -g status-style "bg=#000000,fg=#808080"
set -g status-left-length 40
set -g status-right-length 150

# window separator
set -g window-status-separator " "

# status left - session pill
set -g status-left " #[fg=#2a2a2a,bg=#000000]__PILL_L__#[fg=#FFB6C1,bg=#2a2a2a] __ICON_TERMINAL__ #[fg=#808080,bg=#1a1a1a] #S #[fg=#1a1a1a,bg=#000000]__PILL_R__  "

# status right - folder, cpu, memory, date pills
set -g status-right " #[fg=#2a2a2a,bg=#000000]__PILL_L__#[fg=#FFB6C1,bg=#2a2a2a] __ICON_FOLDER__ #[fg=#808080,bg=#1a1a1a] #{s|__HOME__|~|:pane_current_path} #[fg=#1a1a1a,bg=#000000]__PILL_R__ #[fg=#2a2a2a,bg=#000000]__PILL_L__#[fg=#FFB6C1,bg=#2a2a2a] __ICON_CPU__ #[fg=#808080,bg=#1a1a1a] #(~/.config/tmux/plugins/tmux-cpu/scripts/cpu_percentage.sh) #[fg=#1a1a1a,bg=#000000]__PILL_R__ #[fg=#2a2a2a,bg=#000000]__PILL_L__#[fg=#FFB6C1,bg=#2a2a2a] __ICON_MEMORY__ #[fg=#808080,bg=#1a1a1a] #(~/.config/tmux/plugins/tmux-cpu/scripts/ram_percentage.sh) #[fg=#1a1a1a,bg=#000000]__PILL_R__ #[fg=#2a2a2a,bg=#000000]__PILL_L__#[fg=#FFB6C1,bg=#2a2a2a] __ICON_CALENDAR__ #[fg=#808080,bg=#1a1a1a] %m/%d %R #[fg=#1a1a1a,bg=#000000]__PILL_R__ "

# window formats - pill shaped
set -g window-status-format "#[fg=#2a2a2a,bg=#000000]__PILL_L__#[fg=#FFB6C1,bg=#2a2a2a] #I #[fg=#808080,bg=#1a1a1a] #W #[fg=#1a1a1a,bg=#000000]__PILL_R__"
set -g window-status-current-format "#[fg=#3a3a3a,bg=#000000]__PILL_L__#[fg=#FF69B4,bg=#3a3a3a] #I #[fg=#a0a0a0,bg=#2a2a2a] #W #[fg=#2a2a2a,bg=#000000]__PILL_R__"
set -g window-status-style "fg=#808080,bg=#000000"
set -g window-status-current-style "fg=#a0a0a0,bg=#000000"
set -g window-status-last-style "fg=#808080,bg=#000000"
set -g window-status-activity-style "fg=#808080,bg=#000000"

# Clock
set -g clock-mode-colour "#00afff"
set -g clock-mode-style 24
